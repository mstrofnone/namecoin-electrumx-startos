name: Build s9pk (StartOS v0.4.x)

on:
  push:
    branches: [0.4.x]
    tags: ['v*']
  pull_request:
    branches: [0.4.x]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install squashfs-tools-ng (tar2sqfs)
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools-ng

      - name: Install start-cli
        run: |
          set -euo pipefail
          mkdir -p ~/bin
          curl -fsSL -o ~/bin/start-cli \
            https://github.com/Start9Labs/start-os/releases/download/v0.4.0-beta.8/start-cli_x86_64-linux
          chmod +x ~/bin/start-cli
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Init developer key
        run: start-cli init-key

      - name: Install npm deps
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build JS bundle
        run: npm run build

      - name: Pack s9pk for ${{ matrix.arch }}
        run: |
          set -euo pipefail
          start-cli s9pk pack --no-assets --arch=${{ matrix.arch }} -o namecoin-electrumx_${{ matrix.arch }}.s9pk
          ls -la namecoin-electrumx_${{ matrix.arch }}.s9pk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecoin-electrumx_${{ matrix.arch }}
          path: namecoin-electrumx_${{ matrix.arch }}.s9pk
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.s9pk
          fail_on_unmatched_files: true
