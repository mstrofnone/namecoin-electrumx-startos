name: Build s9pk

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  # Build the start-sdk image once; subsequent jobs reuse it as a tool.
  build-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build start-sdk image
        run: |
          docker buildx build \
            --target sdk \
            --tag namecoin-electrumx-sdk:local \
            --load \
            -f Dockerfile.sdk .
      - name: Save SDK image
        run: docker save namecoin-electrumx-sdk:local | gzip > sdk.tar.gz
      - name: Upload SDK image
        uses: actions/upload-artifact@v4
        with:
          name: sdk-image
          path: sdk.tar.gz
          retention-days: 1

  build:
    needs: build-sdk
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: matrix.platform == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Extract version
        id: version
        run: echo "version=$(yq e '.version' manifest.yaml)" >> "$GITHUB_OUTPUT"

      - name: Build x86_64 Docker image
        if: matrix.platform == 'x86_64'
        run: make x86

      - name: Build aarch64 Docker image
        if: matrix.platform == 'aarch64'
        run: make arm

      - name: Smoke test image (x86_64 only)
        if: matrix.platform == 'x86_64'
        run: |
          docker load < docker-images/x86_64.tar
          docker run --rm --entrypoint python3 \
            start9/namecoin-electrumx/main:${{ steps.version.outputs.version }} \
            -m electrumx_server --version 2>&1 || \
          docker run --rm --entrypoint python3 \
            start9/namecoin-electrumx/main:${{ steps.version.outputs.version }} \
            -c "import electrumx; print('electrumx', electrumx.__version__ if hasattr(electrumx, '__version__') else 'imported OK')"

      - name: Upload arch tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.platform }}
          path: docker-images/${{ matrix.platform }}.tar
          retention-days: 7

  pack:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download SDK image
        uses: actions/download-artifact@v4
        with:
          name: sdk-image
          path: .

      - name: Load SDK image
        run: docker load < sdk.tar.gz

      - name: Download x86_64 tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image-x86_64
          path: docker-images/

      - name: Download aarch64 tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image-aarch64
          path: docker-images/

      - name: Extract version
        id: version
        run: echo "version=$(yq e '.version' manifest.yaml)" >> "$GITHUB_OUTPUT"

      - name: Pack s9pk via SDK container
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w /workspace \
            namecoin-electrumx-sdk:local \
            sh -c "git config --global --add safe.directory /workspace && start-sdk init && start-sdk pack"
          ls -la ./*.s9pk

      - name: Verify s9pk
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            namecoin-electrumx-sdk:local \
            sh -c "git config --global --add safe.directory /workspace && start-sdk verify s9pk namecoin-electrumx.s9pk"

      - name: Upload s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecoin-electrumx-s9pk-${{ steps.version.outputs.version }}
          path: namecoin-electrumx.s9pk
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: namecoin-electrumx.s9pk
